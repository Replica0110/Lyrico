name: 🏗️ 构建 Debug APK

on:
  push:
    branches: [ master ]
    paths:
      - 'lyrico-app/**'
      - 'lyrico-audiotag/**'
      - 'lyrico-lyrics/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - '.github/workflows/build-debug.yml'
  workflow_dispatch:

concurrency:
  group: debug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🌏 设置时区
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: ☕ 设置 JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 构建 TagLib
        run: |
          chmod +x lyrico-audiotag/scripts/build_taglib.sh
          ./lyrico-audiotag/scripts/build_taglib.sh

      - name: 🔐 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 🐘 配置 Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🛠️ 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 上传 ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-debug-arm64-debug
          path: lyrico-app/build/outputs/apk/debug/lyrico-app-arm64-v8a-debug.apk
          retention-days: 30

      - name: 📤 上传 ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-debug-armv7-debug
          path: lyrico-app/build/outputs/apk/debug/lyrico-app-armeabi-v7a-debug.apk
          retention-days: 30

      - name: 📤 上传 x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-debug-x86-debug
          path: lyrico-app/build/outputs/apk/debug/lyrico-app-x86-debug.apk
          retention-days: 30

      - name: 📤 上传 x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-debug-x86_64-debug
          path: lyrico-app/build/outputs/apk/debug/lyrico-app-x86_64-debug.apk
          retention-days: 30

      - name: 📤 上传 Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-debug-universal-debug
          path: lyrico-app/build/outputs/apk/debug/lyrico-app-universal-debug.apk
          retention-days: 30
